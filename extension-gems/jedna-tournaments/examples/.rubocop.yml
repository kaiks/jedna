AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'logs/**/*'
    - 'results_*/**/*'
    - 'parallel_results/**/*'

# Allow slightly longer methods for tournament logic
Metrics/MethodLength:
  Max: 15

# Allow larger classes for tournament runners
Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'test_*.rb'

# Allow complex tournament logic methods
Metrics/AbcSize:
  Max: 25

# Allow longer lines for readability
Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - '^\s*#'  # Allow long comments

# Allow complex logic in tournament runners
Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 12

# Allow longer blocks for DSL-style code
Metrics/BlockLength:
  Max: 30
  Exclude:
    - 'test_*.rb'
    - '**/*_spec.rb'

# Modern Ruby style
Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

# Documentation for public APIs
Style/Documentation:
  Enabled: true
  Exclude:
    - 'test_*.rb'

# Use modern hash syntax
Style/HashSyntax:
  EnforcedStyle: ruby19_no_mixed_keys

# Prefer symbols for hash keys
Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

# Modern predicate naming
Naming/PredicatePrefix:
  Enabled: true